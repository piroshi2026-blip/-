# Vercel Cron の補完（GitHub Actions）。SITE_CRON_BASE は本番オリジン（末尾スラッシュなし）。
# Secrets: CRON_SECRET, SITE_CRON_BASE（例: https://minna-eta.vercel.app）
# UTC 時刻は vercel.json の crons と揃えています（各時刻の 5 分に実行）。
name: PDCA scheduled

on:
  schedule:
    - cron: "5 0,2,4,6,8,14,23 * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit matching cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_CRON_BASE: ${{ secrets.SITE_CRON_BASE }}
        run: |
          set -e
          test -n "$CRON_SECRET" && test -n "$SITE_CRON_BASE"
          H=$(date -u +%H)
          case $H in
            23) SUFFIX="/api/cron/pdca-plan" ;;
            00) SUFFIX="/api/cron/pdca-slot/0" ;;
            02) SUFFIX="/api/cron/pdca-slot/1" ;;
            04) SUFFIX="/api/cron/pdca-slot/2" ;;
            06) SUFFIX="/api/cron/pdca-slot/3" ;;
            08) SUFFIX="/api/cron/pdca-slot/4" ;;
            14) SUFFIX="/api/cron/pdca-analyze" ;;
            *) echo "No PDCA action for UTC hour $H"; exit 0 ;;
          esac
          URL="${SITE_CRON_BASE}${SUFFIX}"
          echo "POST $URL"
          curl -sS -f -H "Authorization: Bearer $CRON_SECRET" -X POST "$URL"
